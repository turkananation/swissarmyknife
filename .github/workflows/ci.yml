name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Analyze and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1.7.2
        with:
          sdk: "3.12.0"

      - name: Install dependencies
        run: dart pub get

      - name: Verify
        run: dart run tool/agent/verify.dart quick
